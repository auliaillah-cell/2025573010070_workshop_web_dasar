<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Latihan 1</title>
    <link rel="stylesheet" href="latihan-1.css" />
  </head>
  <body>
    <h2>Komponen Button</h2>
    <button class="btn btn-primary">Primary</button>
    <button class="btn btn-secondary">Secondary</button>
    <button class="btn btn-danger">Danger</button>
    <button class="btn btn-outline">Outline</button>

    <h2>Komponen Badge</h2>
    <span class="badge badge-green">Success</span>
    <span class="badge badge-yellow">Warning</span>
    <span class="badge badge-red">Error</span>

    <h2>Komponen Alert</h2>
    <div class="alert alert-success">✅ Data berhasil disimpan</div>
    <div class="alert alert-warning">⚠️ Perhatikan input anda</div>
    <div class="alert alert-error">❌ Terjadi kesalahan</div>
  </body>
</html>
