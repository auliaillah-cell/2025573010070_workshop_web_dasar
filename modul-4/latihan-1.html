<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="latihan-1.css" />
  </head>
  <body>
    <div class="container">
      <!-- Sidebar -->
      <aside class="sidebar">
        <h2>Dashboard</h2>
        <ul>
          <li>Home</li>
          <li>User</li>
          <li>Produk</li>
          <li>Laporan</li>
        </ul>
      </aside>

      <!-- Header -->
      <header class="header">
        <h1>Admin Panel</h1>
      </header>

      <!-- Main Content -->
      <main class="main">
        <!-- Statistik -->
        <div class="cards">
          <div class="card">User</div>
          <div class="card">Produk</div>
          <div class="card">Transaksi</div>
          <div class="card">Pendapatan</div>

        <!-- Table & Chart -->
        <div class="content-bottom">

          <div class="chart">Grafik</div>
        </div>
      </main>
    </div>
